<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrainsMono Nerd Font', monospace;
      background: #1a1b26;
      color: #c0caf5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 700px; width: 100%; }
    h1 {
      font-size: 1.4rem;
      color: #7aa2f7;
      margin-bottom: 2rem;
      font-weight: 400;
    }
    .folder { margin-bottom: 1.8rem; }
    .folder h2 {
      font-size: 0.85rem;
      color: #565f89;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
      font-weight: 600;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    a {
      color: #c0caf5;
      text-decoration: none;
      padding: 0.35rem 0.7rem;
      border-radius: 4px;
      font-size: 0.85rem;
      transition: background 0.15s, color 0.15s;
    }
    a:hover {
      background: #292e42;
      color: #7aa2f7;
    }
    a:focus {
      outline: 1px solid #7aa2f7;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>~</h1>

    <div class="folder">
      <h2>NixOS</h2>
      <div class="links">
        <a href="https://search.nixos.org/options?channel=unstable&include_home_manager_options=1&include_modular_service_options=1&include_nixos_options=1">NixOS Search</a>
        <a href="https://niri-wm.github.io/niri/">Niri Wiki</a>
      </div>
    </div>

    <div class="folder">
      <h2>Work</h2>
      <div class="links">
        <a href="https://outlook.cloud.microsoft/mail/">Outlook</a>
        <a href="https://teams.cloud.microsoft/">Teams</a>
        <a href="https://app.fizzy.do/6172759/boards/03fqfadkang7940o21lqrzl2e/columns/stream">To-Do</a>
        <a href="https://m365.cloud.microsoft/chat">Copilot</a>
        <a href="https://admin.cloud.microsoft/">Microsoft Admin</a>
        <a href="https://central.sophos.com/manage/overview/dashboard">Sophos Admin</a>
        <a href="https://www.swyxon.com/ControlCenter">Swyx Control</a>
        <a href="https://ms.hees.de/email_security/email_livetracking">Email Tracking</a>
        <a href="https://mein.einfachgast.de/live">EinfachGast</a>
      </div>
    </div>

    <div class="folder">
      <h2>Tools</h2>
      <div class="links">
        <a href="https://www.photopea.com/">Photo Editor</a>
        <a href="https://www.remove.bg/">Background Remover</a>
        <a href="https://app.diagrams.net/">Graph Maker</a>
      </div>
    </div>
  </div>
</body>
</html>
